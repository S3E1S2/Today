name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            APP_DIR=$(pm2 describe today --no-color 2>/dev/null | grep "exec path" | awk '{print $NF}' | xargs dirname || echo "")
            if [ -z "$APP_DIR" ]; then
              APP_DIR=$(find /var /home /root -name "package.json" -path "*/today/*" -not -path "*/node_modules/*" 2>/dev/null | head -1 | xargs dirname || echo "/var/www/today")
            fi
            echo "App directory: $APP_DIR"
            cd "$APP_DIR"
            git pull origin main
            npm install --production=false
            npm run build
            pm2 restart today
